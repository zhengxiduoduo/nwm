run_name: nwm_cdit_s_lora_scand

from_checkpoint: ./pretrained/nwm_cdit_s_base.pth.tar
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.0

geom_cache_root: "/media/jingzhang/T7 Shield/datasets/scand_geom_cache"

# training setup
results_dir: logs
train: True
batch_size: 4
num_workers: 12
model: CDiT-S/2
lr: 8e-5

# normalization for the action space
normalize: True
grad_clip_val: 10.0
context_size: 4

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: -64
  max_dist_cat: 64

# action output params
len_traj_pred: 64

# dataset specific parameters
image_size: 224
datasets:
